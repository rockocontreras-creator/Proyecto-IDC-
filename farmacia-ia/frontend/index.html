<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaAI Pro | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-section">
                <i data-lucide="activity"></i>
                <span class="logo-text">PharmaAI</span>
            </div>
            <nav class="info-nav">
                <button class="nav-btn active" onclick="showSection('search', this)">
                    <i data-lucide="search" size="18"></i> Comparador
                </button>
                <button class="nav-btn" onclick="showSection('chat', this)">
                    <i data-lucide="message-circle" size="18"></i> Mathew IA
                </button>
                <button class="nav-btn" onclick="showSection('history', this); cargarHistorial();">
                    <i data-lucide="history" size="18"></i> Historial
                </button>
                <button class="nav-btn" onclick="showSection('map', this)">
                    <i data-lucide="map-pin" size="18"></i> Mapa Salud
                </button>
            </nav>
        </aside>

        <main class="main-content">
            <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
                <button id="theme-toggle" class="icon-btn">
                    <i data-lucide="moon" id="theme-icon"></i>
                </button>
            </div>

            <div id="search-section" class="content-section active-section">
                <div class="panel-card">
                    <h2>Comparación de Precios</h2>
                    <div class="search-bar">
                        <input type="text" id="manual-search" placeholder="Ej: Paracetamol 500mg">
                        <button class="btn-primary" onclick="startScraping()">Comparar</button>
                    </div>
                    <div id="scraping-results"></div>
                </div>
            </div>

            <div id="chat-section" class="content-section">
                <div class="panel-card" style="height: 75vh; display: flex; flex-direction: column;">
                    <h2>Asistente Mathew</h2>
                    <div id="chat-box" class="chat-display"></div>
                    <div class="search-bar">
                        <input type="text" id="chat-input" placeholder="Pregunta sobre medicamentos...">
                        <button class="btn-primary" onclick="enviarMensaje()">Consultar</button>
                    </div>
                </div>
            </div>

            <div id="history-section" class="content-section">
                <div class="panel-card">
                    <h2>Historial (DB 3FN)</h2>
                    <div id="history-content"></div>
                </div>
            </div>

            <div id="map-section" class="content-section">
                <div class="panel-card">
                    <h2>Geolocalización</h2>
                    <div style="display:flex; gap:10px; margin-bottom:15px;">
                        <button class="btn-primary" style="flex:1" onclick="actualizarMapa('hospitales')">Clínicas</button>
                        <button class="btn-primary" style="flex:1; background:#64748b" onclick="actualizarMapa('farmacias')">Farmacias</button>
                    </div>
                    <iframe id="map-iframe" width="100%" height="450" frameborder="0" src="about:blank"></iframe>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
