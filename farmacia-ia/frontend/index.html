<!DOCTYPE html> <html lang="es"> <head>
    <meta charset="UTF-8"> <title>PharmaAI Pro</title> <link rel="stylesheet" href="style.css"> <style>
        /* Estilos internos para componentes específicos del panel de control */
        .panel-card { max-width: 950px; margin: 20px auto; padding: 25px; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .content-section { display: none; } /* Oculta las secciones por defecto para la navegación SPA (Single Page Application) */
        .active-section { display: block; } /* Clase que hace visible la sección activa mediante JavaScript */
        .nav-btn.active { border: 2px solid #2563eb; background: #eff6ff; } /* Resalta visualmente el botón de navegación seleccionado */
        iframe { border-radius: 12px; border: 1px solid #cbd5e1; } /* Estiliza el marco del mapa de geolocalización */
    </style>
</head>
<body>
    <div class="app-container"> <aside class="sidebar">
            <div class="logo" style="padding:20px; color:#2563eb; font-weight:bold; font-size:1.4rem;">PharmaAI</div>
            <nav class="info-nav">
                <button class="nav-btn" onclick="showSection('chat', this)">💬 Asistente</button>
                <button class="nav-btn active" onclick="showSection('search', this)">🔍 Buscar Precio</button>
                <button class="nav-btn" onclick="showSection('history', this); cargarHistorial();">📈 Historial</button>
                <button class="nav-btn" onclick="showSection('map', this)">📍 Clínicas / Locales</button>
            </nav>
        </aside>

        <main class="main-content" style="padding:20px; background:#f8fafc; min-height:100vh;">
            
            <div id="search-section" class="content-section active-section">
                <div class="card panel-card">
                    <h3>Comparador de Precios</h3>
                    <div style="display:flex; gap:10px; margin:20px 0;">
                        <input type="text" id="manual-search" placeholder="Ej: Paracetamol" style="flex:1; padding:12px; border-radius:8px; border:1px solid #ccc;">
                        <button onclick="startScraping()" style="padding:12px 20px; background:#2563eb; color:white; border:none; border-radius:8px; cursor:pointer;">🔍 Comparar</button>
                    </div>
                    <div id="scraping-results"></div>
                </div>
            </div>

            <div id="history-section" class="content-section">
                <div class="card panel-card">
                    <h3>📈 Historial (Base de Datos 3FN)</h3>
                    <div id="history-content" style="margin-top:20px;"></div>
                </div>
            </div>

            <div id="map-section" class="content-section">
                <div class="card panel-card">
                    <h3>Mapa de Salud</h3>
                    <div style="display:flex; gap:10px; margin-bottom:15px;">
                        <button onclick="actualizarMapa('hospitales')" style="flex:1; padding:10px; cursor:pointer; font-weight:bold;">📍 Clínicas</button>
                        <button onclick="actualizarMapa('farmacias')" style="flex:1; padding:10px; cursor:pointer; font-weight:bold;">💊 Farmacias</button>
                    </div>
                    <iframe id="map-iframe" width="100%" height="500" frameborder="0" style="border:0;" src="about:blank"></iframe>
                </div>
            </div>

            <div id="chat-section" class="content-section">
                <div class="card panel-card">
                    <h3>Asistente PharmaAI</h3>
                    <p>Hola Usuario, selecciona una opción del menú para comenzar.</p>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
